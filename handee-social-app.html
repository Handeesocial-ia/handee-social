<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Handee Social — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1B4FD8;--blue-l:#3b6ef5;--blue-pale:rgba(27,79,216,0.1);
  --gold:#F5A623;--green:#22c55e;--red:#ef4444;--purple:#8b5cf6;
  --bg:#05080f;--bg2:#0b1120;--bg3:#111827;--bg4:#1a2235;
  --text:#f0f4ff;--muted:#8896b3;--border:rgba(255,255,255,0.07);
  --card:rgba(255,255,255,0.03);
  --sidebar-w:240px;
  --font:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);}
button{cursor:pointer;font-family:var(--font);}
input,select,textarea{font-family:var(--font);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}
.hidden{display:none!important;}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 30%,rgba(27,79,216,.25) 0,transparent 60%),
             radial-gradient(ellipse at 70% 70%,rgba(245,166,35,.08) 0,transparent 60%),var(--bg);
  padding:24px;}
.auth-card{background:var(--bg3);border:1px solid var(--border);border-radius:24px;
  padding:48px;width:100%;max-width:420px;box-shadow:0 40px 100px rgba(0,0,0,.6);}
.auth-logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:36px;text-align:center;}
.auth-logo span{color:var(--blue-l);}
.auth-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:6px;}
.auth-sub{color:var(--muted);font-size:14px;margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:7px;}
.field input,.field select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 15px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus{border-color:var(--blue);}
.btn-main{width:100%;background:var(--blue);color:#fff;border:none;padding:14px;border-radius:10px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;transition:all .2s;margin-top:4px;}
.btn-main:hover{background:var(--blue-l);}
.auth-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#ef4444;margin-bottom:14px;}
.demo-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-top:22px;}
.demo-box p{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.demo-user{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;font-size:13px;}
.demo-user:hover{background:rgba(255,255,255,.05);}
.d-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

/* APP LAYOUT */
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.s-logo{padding:22px 18px 18px;font-family:'Syne',sans-serif;font-size:18px;font-weight:800;border-bottom:1px solid var(--border);}
.s-logo span{color:var(--blue-l);}
.s-logo small{display:block;font-size:11px;font-weight:400;color:var(--muted);margin-top:2px;}
.s-section{padding:14px 12px 4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin:2px 8px;cursor:pointer;font-size:14px;color:var(--muted);transition:all .15s;border:1px solid transparent;}
.nav-item:hover{color:var(--text);background:var(--card);}
.nav-item.active{color:var(--text);background:rgba(27,79,216,.15);border-color:rgba(27,79,216,.25);}
.nav-item.active .ni{color:var(--blue-l);}
.ni{font-size:16px;width:20px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;}
.s-user{margin-top:auto;border-top:1px solid var(--border);padding:14px;display:flex;align-items:center;gap:10px;}
.u-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.u-name{font-size:13px;font-weight:600;}
.u-plan{font-size:11px;color:var(--muted);}
.logout{margin-left:auto;background:none;border:none;color:var(--muted);font-size:18px;transition:color .2s;}
.logout:hover{color:var(--red);}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.topbar{padding:16px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:50;}
.topbar-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.btn-sm{background:var(--blue);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;transition:all .2s;}
.btn-sm:hover{background:var(--blue-l);}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);padding:8px 14px;border-radius:8px;font-size:13px;transition:all .2s;}
.btn-ghost:hover{border-color:rgba(255,255,255,.2);}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
.content{padding:28px;flex:1;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;}
.card-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;}
.mb20{margin-bottom:20px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;}
.stat-label{font-size:12px;color:var(--muted);margin-bottom:7px;}
.stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;}
.stat-delta{font-size:12px;margin-top:5px;color:var(--green);}
.stat-icon{font-size:22px;margin-bottom:8px;}

/* SYNC BANNER */
.sync-banner{background:linear-gradient(135deg,rgba(27,79,216,.12),rgba(245,166,35,.05));border:1px solid rgba(27,79,216,.25);border-radius:14px;padding:20px;display:flex;align-items:center;gap:18px;margin-bottom:20px;}
.sync-icon{font-size:32px;}
.sync-info h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px;}
.sync-info p{font-size:13px;color:var(--muted);}
.sync-btn{background:var(--blue);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;transition:all .2s;margin-left:auto;white-space:nowrap;}
.sync-btn:hover{background:var(--blue-l);}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px;}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
.chart-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:16px;}
canvas{max-width:100%;}

/* PUBLICATIONS */
.pub-filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.view-toggle{display:flex;background:var(--bg3);border-radius:9px;padding:3px;border:1px solid var(--border);gap:2px;}
.vt-btn{padding:6px 14px;border-radius:6px;border:none;font-size:13px;font-weight:600;background:transparent;color:var(--muted);transition:all .2s;}
.vt-btn.active{background:var(--blue);color:#fff;}
.filter-btn{padding:6px 12px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:600;transition:all .2s;}
.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}

.pub-list{display:flex;flex-direction:column;gap:10px;}
.pub-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px 18px;display:flex;align-items:flex-start;gap:14px;transition:border-color .2s;cursor:pointer;}
.pub-card:hover{border-color:rgba(27,79,216,.3);}
.pub-card.sel{border-color:var(--blue);background:rgba(27,79,216,.05);}
.pub-date{min-width:52px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:7px 5px;text-align:center;}
.pub-dd{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1;}
.pub-mm{font-size:10px;text-transform:uppercase;color:var(--muted);}
.pub-info{flex:1;}
.pub-hook{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:7px;}
.pub-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;}
.chip-pub{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.chip-sched{background:rgba(27,79,216,.12);color:#7ba8ff;border:1px solid rgba(27,79,216,.3);}
.chip-err{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.chip-fmt{background:rgba(245,166,35,.1);color:var(--gold);border:1px solid rgba(245,166,35,.25);}
.chip-plat{background:var(--bg3);border:1px solid var(--border);font-size:12px;}
.pub-time{font-size:12px;color:var(--muted);text-align:right;}
.pub-views{font-size:11px;color:var(--muted);margin-top:3px;}

/* DETAIL PANEL */
.detail-panel{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:24px;overflow-y:auto;max-height:calc(100vh - 140px);position:sticky;top:20px;}
.detail-close{background:none;border:none;color:var(--muted);font-size:18px;float:right;margin-top:-4px;}
.detail-close:hover{color:var(--text);}
.detail-hook{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;line-height:1.35;margin:12px 0 8px;}
.caption-block{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:10px;}
.cap-plat{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.cap-text{font-size:12px;color:var(--muted);line-height:1.7;white-space:pre-wrap;}
.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
.metric-box{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px;text-align:center;}
.metric-val{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
.metric-lbl{font-size:11px;color:var(--muted);margin-top:2px;}

/* CALENDAR */
.cal-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-head-cell{background:var(--bg3);padding:9px;text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}
.cal-cell{background:var(--bg3);min-height:75px;padding:7px;cursor:pointer;transition:background .15s;}
.cal-cell:hover{background:var(--bg4);}
.cal-day{font-size:12px;font-weight:600;margin-bottom:4px;}
.cal-today{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;}
.cal-other{color:var(--muted);}
.cal-dot{width:100%;border-radius:3px;padding:2px 4px;margin-bottom:2px;font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-dot-pub{background:rgba(34,197,94,.2);color:var(--green);}
.cal-dot-sched{background:rgba(27,79,216,.2);color:#7ba8ff;}
.cal-dot-err{background:rgba(239,68,68,.2);color:var(--red);}

/* ACCOUNTS */
.accs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px;}
.acc-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;}
.acc-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.acc-icon{font-size:26px;}
.acc-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.acc-status{font-size:12px;}
.acc-conn{color:var(--green);}
.acc-disc{color:var(--muted);}
.badge-conn{margin-left:auto;background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px;}
.connect-btn{width:100%;background:var(--blue);color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;margin-top:12px;transition:all .2s;}
.connect-btn:hover{background:var(--blue-l);}
.disc-btn{margin-left:auto;background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);padding:7px 12px;border-radius:7px;font-size:12px;font-weight:600;transition:all .2s;}
.disc-btn:hover{background:rgba(239,68,68,.2);}
.conn-info{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 13px;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* SETTINGS */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.sett-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;}
.sett-section h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:18px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);}
.toggle-row:last-of-type{border-bottom:none;}
.tgl-lbl{font-size:14px;}
.tgl-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.toggle{position:relative;display:inline-block;width:40px;height:22px;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background:#374151;border-radius:100px;transition:.3s;}
.slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle input:checked+.slider{background:var(--blue);}
.toggle input:checked+.slider:before{transform:translateX(18px);}

/* ADMIN TABLE */
.adm-table{width:100%;border-collapse:collapse;font-size:14px;}
.adm-table th{background:var(--bg3);padding:11px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border);}
.adm-table td{padding:13px 14px;border-bottom:1px solid var(--border);}
.adm-table tr:hover td{background:var(--card);}
.plan-essentiel{background:rgba(139,92,246,.12);color:#c084fc;border:1px solid rgba(139,92,246,.3);padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;}
.plan-pro{background:rgba(245,166,35,.1);color:var(--gold);border:1px solid rgba(245,166,35,.3);padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600;}
.dot-green{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;}

/* RAPPORT */
.plat-bar{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.plat-bar:last-child{border-bottom:none;}
.bar-track{flex:1;height:5px;background:var(--bg);border-radius:3px;}
.bar-fill{height:100%;background:var(--blue-l);border-radius:3px;transition:width .5s;}

/* THEMES GRID */
.themes-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.theme-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:16px;cursor:pointer;transition:all .2s;}
.theme-card:hover{border-color:rgba(27,79,216,.3);}
.theme-card.t-active{border-color:var(--blue);background:rgba(27,79,216,.08);}
.theme-card h4{font-size:13px;font-weight:600;margin-bottom:5px;margin-top:6px;}
.theme-card p{font-size:12px;color:var(--muted);line-height:1.5;}
.theme-check{float:right;color:var(--green);}

/* TOAST */
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:9px;}
.toast{background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:13px 16px;font-size:14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.4);min-width:250px;animation:tin .3s ease;}
.toast.t-ok{border-color:rgba(34,197,94,.3);}
.toast.t-err{border-color:rgba(239,68,68,.3);}
@keyframes tin{from{transform:translateX(80px);opacity:0;}to{transform:none;opacity:1;}}

/* CHART LEGEND */
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;margin-top:10px;}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-dot{width:10px;height:10px;border-radius:50%;}
</style>
</head>
<body>

<!-- APP -->
<div id="app-view" class="hidden">
  <div class="app">
    <!-- SIDEBAR -->
    <div class="sidebar">

</div>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toasts"></div>

<script>
// ════════════════════════════════════
// DATA
// ════════════════════════════════════
const USERS = {
  'sophie.martin@gmail.com': {

function genPubs(userId) {
  const pubs = [];
  const now = new Date();
  for (let d = -28; d <= 14; d++) {
    const date = new Date(now);
    date.setDate(date.getDate() + d);
    const dow = date.getDay();
    if (dow === 0 || dow === 6) continue;
    const idx = Math.abs(d + 50) % HOOKS.length;
    const hook = HOOKS[idx];
    const isVideo = [1,3,5].includes(dow);
    const isPast = d < 0;
    const status = isPast ? (Math.random() > 0.07 ? 'published' : 'error') : 'scheduled';
    const dayStr = date.toISOString().split('T')[0];
    const platforms = isVideo ? ['tiktok','instagram','facebook'] : ['linkedin','instagram','facebook'];
    pubs.push({
      id:`p${userId}${dayStr}`, date:dayStr,
      hook, format: isVideo ? 'Vidéo' : 'Carrousel', status,
      platforms,
      captions:{
        tiktok: hook+'\n\n🏠 handee.fr — 200+ promoteurs temps réel\n#immobilier #immoneuf #PTZ2025 #handee #achatimmo #logementneuf #investissement #immo #france',
        instagram: hook+'\n\n🏠 handee.fr — 200+ promoteurs\n#immobilier #immoneuf #PTZ2025 #handee #achatimmo #realestate #logement',
        facebook: '🏠 '+hook+'\n\nHandee.fr — 200+ promoteurs synchronisés en temps réel.\n👉 handee.fr\n#immobilier #immoneuf',
        linkedin: hook+'\n\nHandeePro — 200+ promoteurs partenaires.\n👉 pro.handee.fr\n#immobilier #CGP #immoneuf'
      },
      metrics: isPast ? {
        tiktok:{views:Math.floor(Math.random()*8000+500),likes:Math.floor(Math.random()*400+20),shares:Math.floor(Math.random()*80+5)},
        instagram:{views:Math.floor(Math.random()*3000+200),likes:Math.floor(Math.random()*200+10),shares:Math.floor(Math.random()*40+2)},
        facebook:{views:Math.floor(Math.random()*1500+100),likes:Math.floor(Math.random()*80+5),shares:Math.floor(Math.random()*20+1)},
        linkedin:{views:Math.floor(Math.random()*600+50),likes:Math.floor(Math.random()*40+3),shares:Math.floor(Math.random()*15+1)}
      } : null,
      aiModel: isVideo ? 'Kling 2.1' : 'Flux Schnell'
    });
  }
  return pubs;
}

function drawLineChart(allPubs, published) {
  const canvas = document.getElementById('chart-main');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2; canvas.height = 360;
  ctx.scale(2,2);
  const W = canvas.offsetWidth/2, H = 180;
  const last7 = published.slice(-7);
  if (!last7.length) return;
  const labels = last7.map(p => new Date(p.date).toLocaleDateString('fr-FR',{weekday:'short'}));
  const datasets = [
    {key:'tiktok',color:'#ff4d6d'},
    {key:'instagram',color:'#f5a623'},
    {key:'facebook',color:'#3b6ef5'},
    {key:'linkedin',color:'#22c55e'}
  ];
  const pad = {l:30,r:10,t:10,b:30};
  const cW = W-pad.l-pad.r, cH = H-pad.t-pad.b;
  const allVals = last7.flatMap(p=>datasets.map(d=>p.metrics?.[d.key]?.views||0));
  const maxV = Math.max(...allVals, 100);

  ctx.clearRect(0,0,W,H);
  // grid lines
  for(let i=0;i<=4;i++) {
    const y = pad.t + cH*(1-i/4);
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#8896b3'; ctx.font='10px DM Sans'; ctx.textAlign='right';
    ctx.fillText(Math.round(maxV*i/4/100)*100, pad.l-5, y+3);
  }
  // x labels
  last7.forEach((p,i) => {
    const x = pad.l + i*cW/(last7.length-1);
    ctx.fillStyle='#8896b3'; ctx.font='10px DM Sans'; ctx.textAlign='center';
    ctx.fillText(labels[i], x, H-8);
  });
  // lines
  datasets.forEach(ds => {
    const vals = last7.map(p=>p.metrics?.[ds.key]?.views||0);
    ctx.strokeStyle=ds.color; ctx.lineWidth=2; ctx.beginPath();
    vals.forEach((v,i) => {
      const x = pad.l+i*cW/(last7.length-1);
      const y = pad.t+cH*(1-v/maxV);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
    // dots
    vals.forEach((v,i) => {
      const x = pad.l+i*cW/(last7.length-1);
      const y = pad.t+cH*(1-v/maxV);
      ctx.fillStyle=ds.color; ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    });
  });
}

function drawPieChart(published) {
  const canvas = document.getElementById('chart-pie');
  if (!canvas) return;
  canvas.width = 320; canvas.height = 320;
  const ctx = canvas.getContext('2d');
  const W = 160, H = 160, R = 60, r = 35;
  ctx.clearRect(0,0,320,320);
  const vids = published.filter(p=>p.format==='Vidéo').length;
  const cars = published.filter(p=>p.format==='Carrousel').length;
  const total = vids+cars||1;
  const slices = [{v:vids/total*Math.PI*2,c:'#3b6ef5'},{v:cars/total*Math.PI*2,c:'#f5a623'}];
  let angle = -Math.PI/2;
  slices.forEach(s => {
    ctx.beginPath(); ctx.moveTo(W,H); ctx.arc(W,H,R,angle,angle+s.v); ctx.closePath();
    ctx.fillStyle=s.c; ctx.fill();
    angle+=s.v;
  });
  ctx.beginPath(); ctx.arc(W,H,r,0,Math.PI*2); ctx.fillStyle='#111827'; ctx.fill();
  ctx.fillStyle='#f0f4ff'; ctx.font='bold 14px Syne,sans-serif'; ctx.textAlign='center';
  ctx.fillText(published.length, W, H+5);
  ctx.font='11px DM Sans'; ctx.fillStyle='#8896b3';
  ctx.fillText('posts', W, H+18);
}

function renderCal(pubs, body) {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth();
  const first = new Date(y,m,1), last = new Date(y,m+1,0);
  const firstDow = first.getDay()||7;
  let html = `<div class="cal-wrap"><div class="cal-head">`;
  ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].forEach(d=>html+=`<div class="cal-head-cell">${d}</div>`);
  html += `</div><div class="cal-body">`;
  for(let i=1;i<firstDow;i++){
    const d=new Date(first); d.setDate(d.getDate()-(firstDow-i));
    html+=`<div class="cal-cell"><div class="cal-day cal-other">${d.getDate()}</div></div>`;
  }
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(y,m,d);
    const dayStr=date.toISOString().split('T')[0];
    const isToday=date.toDateString()===now.toDateString();
    const dayPubs=pubs.filter(p=>p.date===dayStr);
    html+=`<div class="cal-cell">
      <div class="cal-day ${isToday?'':''}"><span ${isToday?'class="cal-today"':''}>${d}</span></div>
      ${dayPubs.map(p=>`<div class="cal-dot cal-dot-${p.status}" onclick="currentView='list';selectedPub='${p.id}';renderPage()">${p.format==='Vidéo'?'🎬':'🖼️'} ${p.hook.substring(0,18)}…</div>`).join('')}
    </div>`;
  }
  html += `</div></div>`;
  body.innerHTML = html;
}

async function syncN8n() {
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = '⟳ Envoi…'; }

  const payload = {
    userId:   currentUser.id,
    email:    currentUser.email,
    plan:     currentUser.plan,
    city:     currentUser.city || '',
    specialty: currentUser.specialty || '',
    themes:   currentUser.themes || [],
    accounts: currentUser.accounts,
    settings: currentUser.settings,
    apiKeys: {
      uploadpost: document.getElementById('inp-uploadpost-key')?.value || '',
      falai:      document.getElementById('inp-falai-key')?.value || '',
      anthropic:  document.getElementById('inp-anthropic-key')?.value || '',
    },
    updatedAt: new Date().toISOString()
  };

  // Si webhook n8n configuré → appel réel
  if (N8N_WEBHOOK && !N8N_WEBHOOK.includes('VOTRE-N8N')) {
    try {
      const resp = await fetch(N8N_WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (resp.ok) {
        toast('✅ Configuration envoyée à n8n avec succès !', 'ok');
        saveUserData();
      } else {
        throw new Error('HTTP ' + resp.status);
      }
    } catch(e) {
      toast('❌ Erreur n8n : ' + e.message, 'err');
    }
  } else {
    // Mode démo — simulation
    saveUserData();
    setTimeout(() => toast('✅ Config sauvegardée (configurez votre webhook n8n pour activer l'automation)', 'ok'), 400);
  }
  if (btn) { btn.disabled = false; btn.textContent = '🔄 Mettre à jour n8n'; }
}

async function adminSyncAllN8n() {

  toast(`⟳ Synchronisation de ${clients.length} clients vers n8n…`, 'ok');
  let ok = 0;
  for (const client of clients) {
    try {
      await fetch(webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId: client.id, email: client.email, plan: client.plan,
          city: client.city, specialty: client.specialty,
          themes: client.themes || [], accounts: client.accounts || {},
          settings: client.settings || {},

          },
          publishTime: client.settings?.publishTime || '07'
        })
      });

  }
  setTimeout(() => toast(`✅ ${ok}/${clients.length} clients synchronisés avec n8n !`, 'ok'), 800);
}

function drawRapportChart(pub) {
  const canvas = document.getElementById('chart-rapport');
  if (!canvas) return;
  canvas.width = canvas.offsetWidth * 2; canvas.height = 360;
  const ctx = canvas.getContext('2d');
  ctx.scale(2,2);
  const W = canvas.offsetWidth/2, H = 180;
  const weeks = ['S1','S2','S3','S4'];
  const vals = weeks.map((_,i)=>{
    const chunk = pub.slice(i*5,(i+1)*5);
    return chunk.reduce((s,p)=>s+(p.metrics?Object.values(p.metrics).reduce((a,m)=>a+(m.views||0),0):0),0);
  });
  const maxV = Math.max(...vals,100);
  const pad = {l:40,r:10,t:10,b:30};
  const cW = W-pad.l-pad.r, cH = H-pad.t-pad.b;
  const bw = cW/weeks.length*0.55, gap = cW/weeks.length;
  ctx.clearRect(0,0,W,H);
  // grid
  for(let i=0;i<=4;i++){
    const y=pad.t+cH*(1-i/4);
    ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='#8896b3'; ctx.font='10px DM Sans'; ctx.textAlign='right';
    ctx.fillText(Math.round(maxV*i/4/100)*100,pad.l-5,y+3);
  }
  // bars
  vals.forEach((v,i) => {
    const x = pad.l + i*gap + (gap-bw)/2;
    const bh = (v/maxV)*cH;
    const y = pad.t+cH-bh;
    ctx.fillStyle='#3b6ef5';
    ctx.beginPath();
    ctx.rect(x,y,bw,bh);
    ctx.fill();
    ctx.fillStyle='#8896b3'; ctx.font='10px DM Sans'; ctx.textAlign='center';
    ctx.fillText(weeks[i],x+bw/2,H-8);
  });
}

  </div>`;
  requestAnimationFrame(() => {
    const canvas = document.getElementById('chart-admin');
    if (!canvas) return;
    canvas.width = canvas.offsetWidth*2; canvas.height=300;
    const ctx=canvas.getContext('2d'); ctx.scale(2,2);
    const W=canvas.offsetWidth/2,H=150;
    const data=[{l:'Jan',v:59},{l:'Fév',v:118},{l:'Mar',v:mrr}];
    const maxV=Math.max(...data.map(d=>d.v),100);
    const pad={l:40,r:10,t:10,b:28};
    const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;
    const bw=cW/data.length*0.5,gap=cW/data.length;
    ctx.clearRect(0,0,W,H);
    data.forEach((d,i)=>{
      const x=pad.l+i*gap+(gap-bw)/2;
      const bh=(d.v/maxV)*cH; const y=pad.t+cH-bh;
      ctx.fillStyle='#22c55e';
      ctx.beginPath(); ctx.rect(x,y,bw,bh); ctx.fill();
      ctx.fillStyle='#8896b3'; ctx.font='10px DM Sans'; ctx.textAlign='center';
      ctx.fillText(d.l,x+bw/2,H-8);
      ctx.fillStyle='var(--text)'; ctx.font='bold 11px Syne,sans-serif';
      ctx.fillText(d.v+'€',x+bw/2,y-5);
    });
  });
}

// TOAST
// ════════════════════════════════════
function toast(msg, type='ok') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast t-${type}`;
  el.innerHTML = `<span>${type==='ok'?'✅':'❌'}</span>${msg}`;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}
</script>
